name: Hourly sync

# Every time-based number in SocialView (sparklines, the views-over-time chart,
# "+142 today", Biggest Movers) is derived by diffing snapshots we capture
# ourselves, because no platform API returns view history. Snapshot frequency is
# therefore chart resolution.
#
# Vercel's Hobby plan caps cron at one run per day, which would give the charts
# a single point every 24 hours. So the real schedule lives here instead, and
# vercel.json keeps a daily run as a backstop.
#
# The endpoint is idempotent per hour bucket: running it twice in the same hour
# overwrites that hour's reading rather than double-counting it.

on:
  schedule:
    # Hourly, on the hour. GitHub queues these on load, so expect drift of a few
    # minutes; the endpoint floors to the hour anyway.
    - cron: "0 * * * *"
  # So you can trigger it by hand from the Actions tab.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::APP_URL and CRON_SECRET repository secrets must be set."
            exit 1
          fi

          # Tolerate a trailing slash in the APP_URL secret; otherwise
          # "https://host/" + "/api/cron/sync" yields a // path that Vercel
          # 308-redirects, and curl treats the redirect as a failure.
          base="${APP_URL%/}"

          # Capture status and body separately, and do NOT use --fail-with-body:
          # a partial sync legitimately returns 200 with failures named in the
          # body, and we want to inspect the body on any status, not abort.
          # --location follows the 308 if one still occurs.
          status=$(curl --silent --show-error --location \
            --max-time 300 \
            --output /tmp/sync-body.json \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$base/api/cron/sync") || {
              echo "::error::Sync request could not reach $base/api/cron/sync"
              exit 1
            }

          body=$(cat /tmp/sync-body.json 2>/dev/null)
          echo "HTTP $status"
          echo "$body"

          if [ "$status" = "401" ]; then
            echo "::error::401 Unauthorized -- the CRON_SECRET GitHub secret does not match Vercel's."
            exit 1
          fi
          if [ "$status" != "200" ]; then
            echo "::error::Sync returned HTTP $status"
            exit 1
          fi

          # A partial failure still returns 200, with the failures named in the
          # body, so that one dead connection cannot mask the healthy ones.
          # Surface it as a warning rather than failing the whole run.
          failed=$(printf '%s' "$body" | grep -o '"failed":[0-9]*' | cut -d: -f2)
          if [ "${failed:-0}" -gt 0 ]; then
            echo "::warning::$failed connection(s) failed to sync. See the body above."
          fi
